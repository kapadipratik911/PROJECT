[build]
  command = "pip install -r requirements.txt"
  publish = "static"

[build.environment]
  PYTHON_VERSION = "3.10"

[[redirects]]
  from = "/"
  to = "/"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
